<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaliverse!</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="./src/logic/Xaliverse.js"></script>
    <link rel="stylesheet" href="./src/ui/Style.css">

</head>

<body>
    <h1>¡Xaliverse!</h1>

    <section id="seleccionar-mascota" class="layout-mascota">

        <h2>Selecciona tu mascota</h2>

        <div id="layout-xaliburz" class="grupo-mascotas">
            
        </div>
        
        <button id="btn-seleccionar-mascota" class="btn-seleccionar-mascota">Seleccionar</button>

    </section>

    <section id="idMapa" class="layout-mapa">

        <h2>¡Mapa de Encuentro!</h2>
        <canvas id="Mapa" class="Mapa"></canvas>
        <button onmouseup="detenerMovimiento()" onmousedown="moveUp()" >Arriba</button>
        <button onmouseup="detenerMovimiento()" onmousedown="moveLeft()" >Izquierda</button>
        <button onmouseup="detenerMovimiento()" onmousedown="moveDown()" >Abajo</button>
        <button onmouseup="detenerMovimiento()" onmousedown="moveRight()" >Derecha</button>

    </section>

    <section id="perfil-jugadores" class="layout-perfil-jugadores">

        <div class="perfil-jugador">
            <div class="datos-jugador">
                <h4>Perfil del Jugador</h4>
                <p>Tu Mascota: <span id="mascota-jugador"></span>
                <br> Victorias Totales: <span id="victorias-jugador">0</span></p>
                <span id="resultado-jugador"></span>
            </div>

            <div class="personaje-jugador">
                <img id="img-jugador" class="img-jugador">
            </div>
        </div>

        <div class="perfil-enemigo">
            <div class="datos-enemigo">
                <h4>Perfil del Enemigo</h4>
                <p>Mascota del Enemigo: <span id="mascota-enemiga"></span> <span></span>
                <br> Victorias Totales: <span id="victorias-enemigo">0</span></p>
                <span id="resultado-enemigo"></span>
            </div>

            <div class="personaje-enemigo">
                <img id="img-enemigo" class="img-enemigo">
            </div>
        </div>

    </section>

    <section id="seleccionar-ataque" class="layout-ataques">

        <h2 class="h2-ataque">Selecciona tu ataque</h2>

        <div id="layout-btn-ataque" class="botones-ataques">

        </div>

    </section>

    <div class="layout-reiniciar">
        <button id="boton-reiniciar" class="btn-reiniciar">Volver a jugar</button>  
    </div>

    <section id="anuncio-combate" class="layout-combate">
        <h2 class="h2-combate">Combate</h2>
        
    </section>


</body>

</html>
